name: Deploy AAYAT live demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Prepare public static demo
        run: |
          mkdir -p /tmp/aayat-server-routes
          if [ -d app/api ]; then mv app/api /tmp/aayat-server-routes/api; fi
          if [ -d app/admin ]; then mv app/admin /tmp/aayat-server-routes/admin; fi

      - name: Build static website
        env:
          PAGES_BUILD: "true"
          NEXT_PUBLIC_BASE_PATH: /Aayat-integrated--solution-website
          NEXT_PUBLIC_SITE_URL: https://satitech-admin.github.io/Aayat-integrated--solution-website
        run: npm run build

      - name: Fix remaining public asset paths
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("out")
          prefix = "/Aayat-integrated--solution-website"
          replacements = {
              '"/images/': f'"{prefix}/images/',
              "'/images/": f"'{prefix}/images/",
              '"/videos/': f'"{prefix}/videos/',
              "'/videos/": f"'{prefix}/videos/",
              '\\/images\\/': f'{prefix}\\/images\\/',
              '\\/videos\\/': f'{prefix}\\/videos\\/',
              'url(/images/': f'url({prefix}/images/',
              'url("/images/': f'url("{prefix}/images/',
              "url('/images/": f"url('{prefix}/images/",
              '"/favicon.svg"': f'"{prefix}/favicon.svg"',
              "'/favicon.svg'": f"'{prefix}/favicon.svg'",
              '"/og.png"': f'"{prefix}/og.png"',
              "'/og.png'": f"'{prefix}/og.png'",
          }

          for path in root.rglob("*"):
              if not path.is_file() or path.suffix.lower() not in {".html", ".js", ".css", ".json", ".xml", ".txt"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")
          PY

      - name: Add fallback page
        run: cp out/index.html out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
