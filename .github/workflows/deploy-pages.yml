name: Deploy AAYAT live demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Prepare public static demo
        run: |
          mkdir -p /tmp/aayat-server-routes
          if [ -d app/api ]; then mv app/api /tmp/aayat-server-routes/api; fi
          if [ -d app/admin ]; then mv app/admin /tmp/aayat-server-routes/admin; fi

      - name: Build static website
        id: build
        continue-on-error: true
        env:
          PAGES_BUILD: "true"
          NEXT_PUBLIC_SITE_URL: https://satitech-admin.github.io/Aayat-integrated--solution-website
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/aayat-build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aayat-build-log
          path: /tmp/aayat-build.log
          if-no-files-found: warn

      - name: Stop when build fails
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Add fallback page
        run: cp out/index.html out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
