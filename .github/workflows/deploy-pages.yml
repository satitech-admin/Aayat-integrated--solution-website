name: Deploy AAYAT live demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Prepare public static demo
        run: |
          mkdir -p /tmp/aayat-server-routes
          if [ -d app/api ]; then mv app/api /tmp/aayat-server-routes/api; fi
          if [ -d app/admin ]; then mv app/admin /tmp/aayat-server-routes/admin; fi

      - name: Build static website
        env:
          PAGES_BUILD: "true"
          NEXT_PUBLIC_SITE_URL: https://satitech-admin.github.io/Aayat-integrated--solution-website
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "===== AAYAT BUILD ERROR ====="
            grep -Ei -C 8 "error|failed|failure|export encountered|unsupported|dynamic" build.log | tail -n 220 || true
            echo "===== LAST 120 BUILD LINES ====="
            tail -n 120 build.log
            exit "$status"
          fi
          cat build.log

      - name: Add fallback page
        run: cp out/index.html out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
